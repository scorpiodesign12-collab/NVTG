<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>NVTG</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@500;600;700;800&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}
input{-webkit-user-select:text!important;user-select:text!important}
:root{--navy:#0b1535;--navy2:#152044;--blue:#1e50ff;--blue2:#3d6bff;--white:#fff;--bg:#f0f3ff;--text:#0b1535;--muted:#7a87ac;--border:#d8e0f5;--r:16px;--err:#ff3448;--ok:#00c26f;}
body{min-height:100vh;background:var(--bg);font-family:'Manrope',sans-serif;display:flex;align-items:center;justify-content:center;padding:1.5rem;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(var(--border) 1.2px,transparent 1.2px);background-size:28px 28px;pointer-events:none;z-index:0}
#splash{position:fixed;inset:0;z-index:999;background:var(--navy);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px}
#splash.hide{animation:splashOut .55s cubic-bezier(.4,0,.2,1) forwards}
@keyframes splashOut{to{opacity:0;transform:scale(1.04)}}
.sp-logo{display:flex;align-items:center;gap:14px;animation:fadeUp .6s cubic-bezier(.22,.9,.36,1) .1s both}
.sp-mark{width:58px;height:58px;background:var(--blue);border-radius:16px;display:flex;align-items:center;justify-content:center}
.sp-mark svg{width:30px;height:30px}
.sp-name{font-family:'Syne',sans-serif;font-size:2.6rem;font-weight:800;color:#fff;letter-spacing:-.04em}
.sp-name span{color:#6b8fff}
.sp-sub{font-size:.8rem;color:rgba(255,255,255,.4);font-weight:600;letter-spacing:.14em;text-transform:uppercase;animation:fadeUp .6s cubic-bezier(.22,.9,.36,1) .28s both}
.sp-bar{width:52px;height:3px;border-radius:3px;background:rgba(255,255,255,.1);overflow:hidden;animation:fadeUp .4s ease .42s both}
.sp-bar::after{content:'';display:block;height:100%;width:0;background:#6b8fff;border-radius:3px;animation:loadBar 1.3s ease .55s forwards}
@keyframes loadBar{to{width:100%}}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}
@keyframes shake{20%,60%{transform:translateX(-5px)}40%,80%{transform:translateX(5px)}100%{transform:none}}
@keyframes spinA{to{transform:rotate(360deg)}}
.wrap{position:relative;z-index:1;width:100%;max-width:440px;animation:fadeUp .45s cubic-bezier(.22,.9,.36,1) .1s both}
.logo{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:1.8rem}
.logo-mark{width:42px;height:42px;background:var(--navy);border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-mark svg{width:22px;height:22px}
.logo-name{font-family:'Syne',sans-serif;font-size:1.65rem;font-weight:800;color:var(--navy);letter-spacing:-.03em}
.logo-name span{color:var(--blue)}
.tabs{display:flex;background:rgba(11,21,53,.07);border-radius:14px;padding:5px;margin-bottom:1.4rem;gap:4px}
.tab{flex:1;padding:.82rem;border:none;background:transparent;border-radius:10px;font:700 .95rem/1 'Manrope',sans-serif;color:var(--muted);cursor:pointer;transition:.2s;outline:none}
.tab.act{background:var(--navy);color:#fff;box-shadow:0 2px 12px rgba(11,21,53,.18)}
.card{background:var(--white);border-radius:24px;padding:2rem 1.8rem;border:1.5px solid var(--border);box-shadow:0 4px 32px rgba(11,21,53,.07)}
.card.shake{animation:shake .35s both}
.pn,.st{display:none}
.pn.act,.st.act{display:block;animation:fadeUp .3s both}
.av-wrap{display:flex;flex-direction:column;align-items:center;margin-bottom:1.5rem}
.av-ring{position:relative;width:90px;height:90px;cursor:pointer}
.av-circle{width:90px;height:90px;border-radius:50%;background:var(--bg);border:2.5px dashed var(--border);display:flex;align-items:center;justify-content:center;overflow:hidden;transition:border-color .2s,background .2s}
.av-ring:hover .av-circle{border-color:var(--blue);background:#eef1ff}
.av-circle img{width:100%;height:100%;object-fit:cover;border-radius:50%;display:none}
.av-plus{position:absolute;bottom:2px;right:2px;width:24px;height:24px;background:var(--navy);border-radius:50%;display:flex;align-items:center;justify-content:center;border:2.5px solid #fff}
.av-plus svg{width:11px;height:11px}
#av-hint{font-size:.7rem;color:var(--muted);margin-top:.45rem;text-align:center}
#av-input{display:none}
.f{margin-bottom:1.05rem}
label{display:block;font-size:.68rem;letter-spacing:.09em;text-transform:uppercase;color:var(--muted);margin-bottom:.45rem;font-weight:700}
.iw{position:relative}
input[type=text],input[type=password]{width:100%;padding:.88rem 2.8rem .88rem 3rem;border:1.5px solid var(--border);border-radius:var(--r);font:600 1rem/1 'Manrope',sans-serif;background:var(--bg);color:var(--text);outline:none;transition:border-color .15s,background .15s}
input[type=text]:focus,input[type=password]:focus{border-color:var(--blue);background:#fff}
input::placeholder{color:var(--muted);font-weight:500}
.il,.ir2,.fok{position:absolute;top:50%;transform:translateY(-50%);display:flex;align-items:center}
.il{left:14px;color:var(--muted);pointer-events:none;transition:color .15s}
.ir2{right:12px;background:none;border:none;cursor:pointer;padding:4px;color:var(--muted);outline:none;transition:color .15s}
.ir2:hover{color:var(--navy)}
.fok{right:14px;pointer-events:none;opacity:0;transition:opacity .15s}
input[type=text]:focus~.il,input[type=password]:focus~.il{color:var(--blue)}
.hint{font-size:.7rem;color:var(--muted);margin-top:.3rem}
.bar{display:flex;gap:4px;margin-top:.45rem}
.bar span{flex:1;height:3px;border-radius:3px;background:var(--border);transition:background .25s}
.btn{width:100%;padding:1rem;background:var(--navy);color:#fff;border:none;border-radius:var(--r);font:700 1rem/1 'Manrope',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:.2s;margin-top:.8rem;outline:none}
.btn:hover{background:var(--navy2)}
.btn:active{transform:scale(.98)}
.btn:disabled{background:#c5cde8;cursor:not-allowed;transform:none}
.btn.blue{background:var(--blue)}
.btn.blue:hover:not(:disabled){background:var(--blue2)}
.btn-back{flex:0 0 48px;padding:0;margin-top:0;background:var(--bg);color:var(--navy);border:1.5px solid var(--border)}
.btn-back:hover{background:var(--border)!important}
.bg{display:flex;gap:10px;margin-top:.8rem}
.bg .btn:not(.btn-back){flex:1;margin-top:0}
.spin-btn{width:18px;height:18px;border:2.5px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spinA .7s linear infinite;display:none}
.err-msg{font-size:.78rem;color:var(--err);margin-top:.5rem;text-align:center;font-weight:600;min-height:1.1em}
/* CROP MODAL */
#modal{display:none;position:fixed;inset:0;z-index:200;background:rgba(11,21,53,.72);backdrop-filter:blur(6px);align-items:center;justify-content:center;padding:1.2rem}
#modal.open{display:flex}
.modal-box{background:#fff;border-radius:20px;padding:1.2rem;width:100%;max-width:380px;box-shadow:0 16px 60px rgba(0,0,0,.3)}
.modal-box h3{font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;color:var(--navy);margin-bottom:.9rem;text-align:center}
#crop-stage{position:relative;width:100%;border-radius:14px;overflow:hidden;background:#0b1535;cursor:grab;touch-action:none;margin-bottom:.8rem}
#crop-stage:active{cursor:grabbing}
#crop-canvas{position:absolute;top:0;left:0;transform-origin:top left}
.mask-layer{position:absolute;inset:0;pointer-events:none}
#mask-canvas{display:block;width:100%;height:100%}
.zoom-row{display:flex;align-items:center;gap:10px;margin-bottom:.8rem}
.zoom-row label{font-size:.65rem;margin:0}
#zoom-r{flex:1;height:4px;-webkit-appearance:none;background:var(--border);border-radius:4px;outline:none;border:none;padding:0}
#zoom-r::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;background:var(--navy);border-radius:50%;cursor:pointer;border:3px solid #fff;box-shadow:0 1px 6px rgba(0,0,0,.2)}
.modal-btns{display:flex;gap:8px}
.modal-btns .btn{margin-top:0;flex:1;padding:.8rem}
</style>
</head>
<body>
<div id="splash">
  <div class="sp-logo">
    <div class="sp-mark"><svg viewBox="0 0 24 24" fill="none"><path d="M4 6h16M4 12h10M4 18h13" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/><circle cx="19" cy="18" r="3.5" fill="#fff"/></svg></div>
    <div class="sp-name">NV<span>TG</span></div>
  </div>
  <div class="sp-sub">Мессенджер нового поколения</div>
  <div class="sp-bar"></div>
</div>

<div class="wrap">
  <div class="logo">
    <div class="logo-mark"><svg viewBox="0 0 24 24" fill="none"><path d="M4 6h16M4 12h10M4 18h13" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/><circle cx="19" cy="18" r="3.5" fill="#1e50ff"/></svg></div>
    <div class="logo-name">NV<span>TG</span></div>
  </div>

  <div class="tabs">
    <button class="tab act" onclick="swTab('reg',this)">Регистрация</button>
    <button class="tab" onclick="swTab('log',this)">Войти</button>
  </div>

  <div class="card" id="card">
    <!-- REGISTER -->
    <div class="pn act" id="reg">
      <div id="s1" class="st act">
        <div class="av-wrap">
          <div class="av-ring" onclick="document.getElementById('av-input').click()">
            <div class="av-circle"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="1.8"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><img id="av-preview"></div>
            <div class="av-plus"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></div>
          </div>
          <div id="av-hint">Фото профиля · до 3 МБ</div>
        </div>
        <div class="f"><label>Имя</label><div class="iw"><input type="text" id="rn" placeholder="Ваше имя" maxlength="30" oninput="vi('rn')"><span class="il"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span><span class="fok" id="o-rn"></span></div></div>
        <div class="f"><label>Юзернейм</label><div class="iw"><input type="text" id="ru" placeholder="@username" maxlength="20" oninput="vi('ru')"><span class="il"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M16 8v5a3 3 0 0 0 6 0v-1a10 10 0 1 0-3.92 7.94"/></svg></span><span class="fok" id="o-ru"></span></div><div class="hint">Только латиница, цифры, _ (мин. 3 символа)</div></div>

        <div id="err1" class="err-msg"></div>
        <button class="btn blue" id="ns-btn" disabled onclick="go2()">Далее →</button>
      </div>

      <div id="s2" class="st">
        <div class="f"><label>Пароль</label><div class="iw"><input type="password" id="rp1" placeholder="Минимум 6 символов" oninput="vi('rp1')"><span class="il"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></span><button class="ir2" id="e-rp1" type="button" onclick="eyeTog('rp1',this)"></button></div><div class="bar" id="pbar"><span></span><span></span><span></span><span></span></div></div>
        <div class="f"><label>Повторите пароль</label><div class="iw"><input type="password" id="rp2" placeholder="Повторите пароль" oninput="vi('rp2')"><span class="il" id="mi"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></span><button class="ir2" id="e-rp2" type="button" onclick="eyeTog('rp2',this)"></button></div></div>
        <div id="err2" class="err-msg"></div>
        <div class="bg"><button class="btn btn-back" onclick="go1()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg></button><button class="btn blue" id="rb" disabled onclick="doReg()"><span id="rb-l">Создать аккаунт</span><span class="spin-btn" id="rb-s"></span></button></div>
      </div>
    </div>

    <!-- LOGIN -->
    <div class="pn" id="log">
      <div class="f"><label>Юзернейм или Email</label><div class="iw"><input type="text" id="lu" placeholder="@username или email"><span class="il"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M16 8v5a3 3 0 0 0 6 0v-1a10 10 0 1 0-3.92 7.94"/></svg></span></div></div>
      <div class="f"><label>Пароль</label><div class="iw"><input type="password" id="lp" placeholder="Ваш пароль" onkeydown="if(event.key==='Enter')doLog()"><span class="il"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></span><button class="ir2" id="e-lp" type="button" onclick="eyeTog('lp',this)"></button></div></div>
      <div id="errl" class="err-msg"></div>
      <button class="btn blue" id="lb" onclick="doLog()"><span id="lb-l">Войти</span><span class="spin-btn" id="lb-s"></span></button>
    </div>
  </div>
</div>

<!-- CROP MODAL -->
<div id="modal">
  <div class="modal-box">
    <h3>Фото профиля</h3>
    <div id="crop-stage"><canvas id="crop-canvas"></canvas><div class="mask-layer"><canvas id="mask-canvas"></canvas></div></div>
    <div class="zoom-row"><label>Масштаб</label><input type="range" id="zoom-r" min="50" max="300" value="100" oninput="applyZoom(+this.value)"></div>
    <div class="modal-btns">
      <button class="btn" style="background:var(--bg);color:var(--muted);border:1.5px solid var(--border)" onclick="closeModal()">Отмена</button>
      <button class="btn blue" onclick="applyCrop()">Применить</button>
    </div>
  </div>
</div>
<input type="file" id="av-input" accept="image/*" style="display:none">

<script>
const SURL='https://eolvegtnfebxhbhxuzwx.supabase.co';
const SKEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVvbHZlZ3RuZmVieGhiaHh1end4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMDk4NTQsImV4cCI6MjA4OTU4NTg1NH0.5NKUEc2h9s4_vsLpK_wlxiCBqC2OJucgBix8dmFbC3E';
const sb=supabase.createClient(SURL,SKEY);

// SPLASH
window.addEventListener('DOMContentLoaded',async()=>{
  // check if already logged in
  const {data:{user}}=await sb.auth.getUser();
  if(user){location.href='nvtg-chats.html';return;}
  const sp=document.getElementById('splash');
  setTimeout(()=>{sp.classList.add('hide');setTimeout(()=>sp.style.display='none',560);},1950);
});

const EYE='<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
const EYE2='<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>';
const OK='<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--ok)" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>';
const NO='<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--err)" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';

['rp1','rp2','lp'].forEach(id=>{const b=document.getElementById('e-'+id);if(b)b.innerHTML=EYE;});

function eyeTog(id,b){const e=document.getElementById(id),p=e.type==='password';e.type=p?'text':'password';b.innerHTML=p?EYE2:EYE;b.style.color=p?'var(--navy)':'';}
function shake(){const c=document.getElementById('card');c.classList.remove('shake');void c.offsetWidth;c.classList.add('shake');}
function pwS(v){let s=0;if(v.length>=6)s++;if(/[a-z]/.test(v)&&/[A-Z]/.test(v))s++;if(/[0-9]/.test(v))s++;if(/[^a-zA-Z0-9]/.test(v))s++;return s;}
const BC=['#ff3448','#ff9900','#0088ff','#00c26f'];
function updBar(v){const s=pwS(v);document.querySelectorAll('#pbar span').forEach((x,i)=>{x.style.background=i<s?BC[i]:'var(--border)';});}

function vi(id){
  const e=document.getElementById(id);let v=e.value;
  if(id==='ru'){v=v.replace(/[^a-zA-Z0-9_]/g,'');e.value=v?'@'+v:'';v=e.value;}
  const ok=document.getElementById('o-'+id);
  if(ok){const ml=(id==='ru')?4:3;ok.innerHTML=v.length>=(ml-1)?(v.length>=ml?OK:NO):'';ok.style.opacity=v.length>=(ml-1)?1:0;}
  if(id==='rp1'){updBar(v);updMatch();}
  if(id==='rp2')updMatch();
  ck1();ck2();
}
function updMatch(){
  const p1=document.getElementById('rp1').value,p2=document.getElementById('rp2').value,m=document.getElementById('mi');
  if(!p2){m.style.color='';m.innerHTML='<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>';return;}
  const ok=p1===p2&&pwS(p1)>=4;
  m.style.color=ok?'var(--ok)':'var(--err)';
  m.innerHTML=ok?'<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>':'<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';
}
function ck1(){
  const n=document.getElementById('rn').value,u=document.getElementById('ru').value;
  document.getElementById('ns-btn').disabled=!(n.length>=3&&u.length>=4);
}
function ck2(){const p1=document.getElementById('rp1').value,p2=document.getElementById('rp2').value;document.getElementById('rb').disabled=!(pwS(p1)>=4&&p1===p2&&p2.length>0);}
function go2(){document.getElementById('s1').classList.remove('act');document.getElementById('s2').classList.add('act');updBar('');updMatch();ck2();}
function go1(){document.getElementById('s2').classList.remove('act');document.getElementById('s1').classList.add('act');}
function swTab(n,t){
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('act'));t.classList.add('act');
  document.querySelectorAll('.pn').forEach(x=>x.classList.remove('act'));document.getElementById(n).classList.add('act');
  if(n==='reg')go1();
}

async function doReg(){
  const btn=document.getElementById('rb');
  btn.disabled=true;document.getElementById('rb-l').textContent='';document.getElementById('rb-s').style.display='block';
  document.getElementById('err2').textContent='';
  const name=document.getElementById('rn').value.trim();
  const rawu=document.getElementById('ru').value.replace('@','').toLowerCase();
  const email=rawu+'@nvtg.app';
  const pass=document.getElementById('rp1').value;
  try {
    // check username unique
    const {data:exist}=await sb.from('profiles').select('id').eq('username','@'+rawu).maybeSingle();
    if(exist){document.getElementById('err2').textContent='Этот юзернейм уже занят';btn.disabled=false;document.getElementById('rb-s').style.display='none';document.getElementById('rb-l').textContent='Создать аккаунт';shake();return;}
    const {data,error}=await sb.auth.signUp({email,password:pass});
    if(error) throw error;
    const uid=data.user.id;
    // upload avatar if any
    let avatarUrl='';
    if(cropBlob){
      const path=`${uid}/avatar.jpg`;
      await sb.storage.from('avatars').upload(path,cropBlob,{contentType:'image/jpeg',upsert:true});
      const {data:pu}=sb.storage.from('avatars').getPublicUrl(path);
      avatarUrl=pu.publicUrl+'?t='+Date.now();
    }
    const {error:pe}=await sb.from('profiles').insert({id:uid,username:'@'+rawu,full_name:name,avatar_url:avatarUrl,email:email});
    if(pe) throw pe;
    location.href='nvtg-chats.html';
  } catch(e){
    document.getElementById('err2').textContent=e.message||'Ошибка регистрации';
    btn.disabled=false;document.getElementById('rb-s').style.display='none';document.getElementById('rb-l').textContent='Создать аккаунт';
    shake();
  }
}

async function doLog(){
  const btn=document.getElementById('lb');
  btn.disabled=true;document.getElementById('lb-l').textContent='';document.getElementById('lb-s').style.display='block';
  document.getElementById('errl').textContent='';
  let u=document.getElementById('lu').value.trim();
  const p=document.getElementById('lp').value;
  if(!u||!p){document.getElementById('errl').textContent='Заполните все поля';btn.disabled=false;document.getElementById('lb-s').style.display='none';document.getElementById('lb-l').textContent='Войти';shake();return;}
  try {
    // if username, find email
    let email=u;
    if(!u.includes('@')||u.startsWith('@')){
      const uname=u.startsWith('@')?u:'@'+u;
      const {data:prof}=await sb.from('profiles').select('id').eq('username',uname).maybeSingle();
      if(!prof){
        // try as email anyway
        email=u;
      } else {
        const {data:authU}=await sb.auth.admin?.getUserById?.(prof.id)||{data:null};
        // fallback: store email on profile
        const {data:p2}=await sb.from('profiles').select('email').eq('username',uname).maybeSingle();
        if(p2?.email) email=p2.email; else email=u;
      }
    }
    const {error}=await sb.auth.signInWithPassword({email,password:p});
    if(error) throw error;
    location.href='nvtg-chats.html';
  } catch(e){
    document.getElementById('errl').textContent='Неверный email или пароль';
    btn.disabled=false;document.getElementById('lb-s').style.display='none';document.getElementById('lb-l').textContent='Войти';
    shake();
  }
}

// CROP
let srcImg=null,cropBlob=null,ox=0,oy=0,sc=1,stW=0,drag=false,lx=0,ly=0,pd=0,sc0=0;
document.getElementById('av-input').addEventListener('change',function(e){
  const f=e.target.files[0];if(!f)return;
  if(f.size>3*1024*1024){const h=document.getElementById('av-hint');h.textContent='Слишком большой! Макс. 3 МБ';h.style.color='var(--err)';this.value='';return;}
  document.getElementById('av-hint').textContent='Фото профиля · до 3 МБ';document.getElementById('av-hint').style.color='';
  const r=new FileReader();r.onload=ev=>{const img=new Image();img.onload=()=>{srcImg=img;openModal();};img.src=ev.target.result;};r.readAsDataURL(f);this.value='';
});
function openModal(){
  document.getElementById('modal').classList.add('open');
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    const stage=document.getElementById('crop-stage');stW=stage.offsetWidth;stage.style.height=stW+'px';
    const fit=Math.max(stW/srcImg.width,stW/srcImg.height);sc=fit;
    ox=(stW-srcImg.width*sc)/2;oy=(stW-srcImg.height*sc)/2;
    document.getElementById('zoom-r').value=Math.round(sc*100);drawMask();renderCrop();
  }));
}
function closeModal(){document.getElementById('modal').classList.remove('open');}
function applyZoom(v){const ns=v/100;ox=stW/2-(stW/2-ox)*(ns/sc);oy=stW/2-(stW/2-oy)*(ns/sc);sc=ns;renderCrop();}
function renderCrop(){
  if(!srcImg||!stW)return;
  const canvas=document.getElementById('crop-canvas');canvas.width=srcImg.width;canvas.height=srcImg.height;
  const ctx=canvas.getContext('2d');ctx.drawImage(srcImg,0,0);
  canvas.style.width=srcImg.width*sc+'px';canvas.style.height=srcImg.height*sc+'px';
  canvas.style.transform='translate('+ox+'px,'+oy+'px)';
}
function drawMask(){
  const mc=document.getElementById('mask-canvas'),s=stW;mc.width=s;mc.height=s;mc.style.width=s+'px';mc.style.height=s+'px';
  const ctx=mc.getContext('2d');ctx.fillStyle='rgba(10,17,40,.6)';ctx.fillRect(0,0,s,s);
  ctx.globalCompositeOperation='destination-out';ctx.beginPath();ctx.arc(s/2,s/2,s/2-3,0,Math.PI*2);ctx.fill();
  ctx.globalCompositeOperation='source-over';ctx.beginPath();ctx.arc(s/2,s/2,s/2-3,0,Math.PI*2);ctx.strokeStyle='rgba(255,255,255,.72)';ctx.lineWidth=2;ctx.stroke();
}
const stage=document.getElementById('crop-stage');
stage.addEventListener('mousedown',e=>{drag=true;lx=e.clientX;ly=e.clientY;});
window.addEventListener('mouseup',()=>drag=false);
window.addEventListener('mousemove',e=>{if(!drag)return;ox+=e.clientX-lx;oy+=e.clientY-ly;lx=e.clientX;ly=e.clientY;renderCrop();});
stage.addEventListener('touchstart',e=>{if(e.touches.length===1){drag=true;lx=e.touches[0].clientX;ly=e.touches[0].clientY;}else if(e.touches.length===2){drag=false;pd=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);sc0=sc;}},{passive:true});
stage.addEventListener('touchmove',e=>{e.preventDefault();if(e.touches.length===1&&drag){ox+=e.touches[0].clientX-lx;oy+=e.touches[0].clientY-ly;lx=e.touches[0].clientX;ly=e.touches[0].clientY;renderCrop();}else if(e.touches.length===2){const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);const ns=Math.max(.5,Math.min(3,sc0*(d/pd)));ox=stW/2-(stW/2-ox)*(ns/sc);oy=stW/2-(stW/2-oy)*(ns/sc);sc=ns;document.getElementById('zoom-r').value=Math.round(ns*100);renderCrop();}},{passive:false});
stage.addEventListener('touchend',()=>drag=false,{passive:true});
stage.addEventListener('wheel',e=>{e.preventDefault();const ns=Math.max(.5,Math.min(3,sc*(e.deltaY>0?.92:1.09)));ox=stW/2-(stW/2-ox)*(ns/sc);oy=stW/2-(stW/2-oy)*(ns/sc);sc=ns;document.getElementById('zoom-r').value=Math.round(ns*100);renderCrop();},{passive:false});
function applyCrop(){
  const OUT=500,out=document.createElement('canvas');out.width=OUT;out.height=OUT;
  const ctx=out.getContext('2d');ctx.beginPath();ctx.arc(OUT/2,OUT/2,OUT/2,0,Math.PI*2);ctx.clip();
  ctx.drawImage(srcImg,-ox/sc,-oy/sc,stW/sc,stW/sc,0,0,OUT,OUT);
  out.toBlob(blob=>{cropBlob=blob;const url=URL.createObjectURL(blob);const img=document.getElementById('av-preview');img.src=url;img.style.display='block';const ico=document.querySelector('.av-circle svg');if(ico)ico.style.display='none';closeModal();},'image/jpeg',.88);
}
</script>
