<!DOCTYPE html>
<html lang="ru">
<head>
<script>
// NVTG Theme
function applyTheme(t){
  document.documentElement.classList.toggle('dark', t==='dark');
  try{ localStorage.setItem('nvtg_theme', t); }catch(e){}
}
(function(){
  try{ var t=localStorage.getItem('nvtg_theme')||'light'; applyTheme(t); }catch(e){}
})();
</script>
<script>
(function(){
  try{
    var on=localStorage.getItem('nvtg_scale_on')==='1';
    var sc=parseInt(localStorage.getItem('nvtg_scale')||'105');
    if(!on || !sc || sc < 80) sc = 105;
    document.documentElement.style.fontSize=(sc/100*16)+'px';
    // zoom applied after body exists
    document.addEventListener('DOMContentLoaded',function(){
      document.body.style.zoom=sc/100;
    });
  }catch(e){}
})();
</script>
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,interactive-widget=resizes-content">
<title>NVTG — Настройки</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}
input,textarea{-webkit-user-select:text!important;user-select:text!important}
html,body{height:100%;font-family:'Manrope',sans-serif;background:#f0f3ff;color:#0b1535;overflow:hidden}
:root{--n:#0b1535;--n2:#152044;--b:#1e50ff;--b2:#3d6bff;--bg:#f0f3ff;--w:#fff;--m:#7a87ac;--br:#dde3f5;--ok:#00c26f;--er:#ff3448}

#app{display:flex;height:100dvh;overflow:hidden}

/* DRAWER OVERLAY */
#dov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;opacity:0;transition:opacity .25s;pointer-events:none}
#dov.on{display:block;opacity:1;pointer-events:auto}

/* SIDEBAR */
#sb{
  position:fixed;top:0;left:0;bottom:0;width:270px;z-index:201;
  background:var(--n);transform:translateX(-100%);
  transition:transform .28s cubic-bezier(.4,0,.2,1);
  display:flex;flex-direction:column;box-shadow:6px 0 30px rgba(0,0,0,.2);
}
#sb.open{transform:translateX(0)}
@media(min-width:701px){
  #sb{position:fixed;box-shadow:6px 0 30px rgba(0,0,0,.2)}
  .bur{display:flex!important}
}
.sbh{height:56px;padding:0 16px;background:rgba(255,255,255,.05);display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,.07);flex-shrink:0}
.sbmark{width:38px;height:38px;background:transparent;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sbmark svg{width:18px;height:18px}
.sbnm{font-family:'Syne',sans-serif;font-size:1.2rem;font-weight:800;color:#fff;letter-spacing:-.03em}
.sbnm span{color:#6b8fff}
.sbnav{flex:1;overflow-y:auto;padding:8px 0}
.sbnav::-webkit-scrollbar{width:0}
.si{display:flex;align-items:center;gap:12px;padding:11px 16px;cursor:pointer;transition:background .15s}
.si:hover{background:rgba(255,255,255,.07)}
.si.act{background:rgba(30,80,255,.25)}
.sic{width:36px;height:36px;border-radius:10px;background:rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sic svg{width:18px;height:18px;color:rgba(255,255,255,.6)}
.si.act .sic{background:var(--b)}
.si.act .sic svg{color:#fff}
.si span{font-size:.92rem;font-weight:600;color:rgba(255,255,255,.7)}
.si.act span,.si.act .sic svg{color:#fff}
.si.red .sic svg,.si.red span{color:#ff5c5c!important}
.sbsep{height:1px;background:rgba(255,255,255,.07);margin:4px 0}

/* MAIN PANEL */
#main{flex:1;display:flex;flex-direction:column;height:100dvh;min-width:0;background:var(--bg);background-image:radial-gradient(var(--br) 1px,transparent 1px);background-size:22px 22px}

/* TOPBAR */
.top{height:56px;background:var(--w);border-bottom:1px solid var(--br);display:flex;align-items:center;padding:0 10px;gap:6px;flex-shrink:0;box-shadow:0 1px 4px rgba(11,21,53,.05)}
.bur{background:none;border:none;cursor:pointer;padding:8px;display:flex;flex-direction:column;gap:5px;outline:none;flex-shrink:0}
.bur span{display:block;width:20px;height:2px;background:var(--m);border-radius:2px;transition:.2s}
.bur:hover span{background:var(--n)}
.tttl{font-family:'Syne',sans-serif;font-size:1rem;font-weight:800;color:var(--n);flex:1;letter-spacing:-.02em}

/* SCROLL AREA */
.pscr{flex:1;overflow-y:auto;padding-bottom:30px}
.pscr::-webkit-scrollbar{width:3px}
.pscr::-webkit-scrollbar-thumb{background:var(--br);border-radius:3px}

/* USER HERO CARD */
.uhero{background:var(--w);display:flex;align-items:center;gap:14px;padding:18px 16px;border-bottom:1px solid var(--br);margin-bottom:8px;cursor:pointer;transition:background .15s}
.uhero:hover{background:rgba(11,21,53,.02)}
.uav{width:58px;height:58px;border-radius:50%;overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:1.3rem;font-weight:800;color:#fff}
.uav img{width:100%;height:100%;object-fit:cover;display:block}
.uinfo{flex:1;min-width:0}
.unm{font-family:'Syne',sans-serif;font-size:1.05rem;font-weight:800;color:var(--n);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.uus{font-size:.78rem;color:var(--b);font-weight:600;margin-top:2px}
.ust{font-size:.72rem;color:var(--m);margin-top:2px}
.uarr{color:var(--m);flex-shrink:0}

/* SECTION */
.card{background:var(--w);border-top:1px solid var(--br);border-bottom:1px solid var(--br);margin-bottom:8px}
.slbl{font-size:.64rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--m);padding:12px 16px 6px}

/* ROWS */
.row{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;transition:background .12s;position:relative}
.row:hover{background:rgba(11,21,53,.03)}
.row+.row::before{content:'';position:absolute;top:0;left:16px;right:0;height:1px;background:var(--br)}
.ric{width:34px;height:34px;border-radius:9px;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ric svg{width:17px;height:17px;color:var(--m)}
.rl{flex:1;min-width:0}
.rlt{font-size:.9rem;font-weight:600;color:var(--n)}
.rls{font-size:.78rem;color:var(--m);margin-top:2px}
.rv{font-size:.82rem;color:var(--b);font-weight:600;white-space:nowrap;flex-shrink:0;margin-left:auto}
.rarr{color:var(--br);flex-shrink:0;margin-left:6px}

/* TOGGLE SWITCH */
.tog{position:relative;width:46px;height:26px;flex-shrink:0;margin-left:auto}
.tog input{opacity:0;width:0;height:0;position:absolute}
.tslider{position:absolute;inset:0;background:var(--br);border-radius:13px;transition:.25s;cursor:pointer}
.tslider::before{content:'';position:absolute;left:3px;top:3px;width:20px;height:20px;background:#fff;border-radius:50%;transition:.25s;box-shadow:0 1px 4px rgba(0,0,0,.2)}
.tog input:checked+.tslider{background:var(--b)}
.tog input:checked+.tslider::before{transform:translateX(20px)}

/* SCALE SLIDER */
.scale-row{padding:12px 16px 16px;border-top:1px solid var(--br)}
.scale-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.scale-lbl{font-size:.86rem;font-weight:600;color:var(--n)}
.scale-val{font-size:.82rem;font-weight:700;color:var(--b);min-width:38px;text-align:right}
.scale-track{position:relative;height:4px;background:var(--br);border-radius:4px;cursor:pointer}
.scale-fill{position:absolute;left:0;top:0;height:100%;background:var(--b);border-radius:4px;pointer-events:none;transition:width .05s}
.scale-thumb{position:absolute;top:50%;transform:translate(-50%,-50%);width:22px;height:22px;background:var(--n);border-radius:50%;border:3px solid #fff;box-shadow:0 2px 8px rgba(11,21,53,.25);cursor:grab;transition:transform .1s;touch-action:none}
.scale-thumb:active{cursor:grabbing;transform:translate(-50%,-50%) scale(1.15)}
.scale-marks{display:flex;justify-content:space-between;margin-top:6px;padding:0 1px}
.scale-marks span{font-size:.62rem;color:var(--m);font-weight:600}

/* LANGUAGE MODAL */
#lov{display:none;position:fixed;inset:0;background:rgba(11,21,53,.5);z-index:300;backdrop-filter:blur(4px);align-items:center;justify-content:center;padding:20px}
#lov.on{display:flex}
#lbox{background:var(--w);border-radius:20px;width:100%;max-width:360px;padding:0;overflow:hidden;box-shadow:0 16px 60px rgba(11,21,53,.2);animation:zin .18s ease}
@keyframes zin{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:none}}
.lmtl{font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;color:var(--n);padding:20px 20px 14px}
.lopt{display:flex;align-items:center;gap:14px;padding:14px 20px;cursor:pointer;transition:background .12s;position:relative}
.lopt:hover{background:var(--bg)}
.lopt+.lopt::before{content:'';position:absolute;top:0;left:20px;right:0;height:1px;background:var(--br)}
.lopt-flag{font-size:1.5rem;line-height:1;flex-shrink:0}
.lopt-nm{font-size:.92rem;font-weight:600;color:var(--n)}
.lopt-sub{font-size:.75rem;color:var(--m);margin-top:2px}
.lopt-chk{margin-left:auto;width:20px;height:20px;border-radius:50%;background:var(--b);display:flex;align-items:center;justify-content:center;opacity:0;transition:.15s;flex-shrink:0}
.lopt-chk svg{width:11px;height:11px;color:#fff}
.lopt.sel .lopt-chk{opacity:1}
.lopt.sel .lopt-nm{color:var(--b)}
.lcanc{display:block;width:100%;padding:14px;text-align:center;font:600 .9rem 'Manrope',sans-serif;color:var(--m);background:var(--bg);border:none;cursor:pointer;border-top:1px solid var(--br);transition:background .12s}
.lcanc:hover{background:var(--br)}

/* TOAST */
#toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(11,21,53,.85);color:#fff;font-size:.82rem;font-weight:600;padding:8px 18px;border-radius:20px;opacity:0;transition:all .25s;pointer-events:none;z-index:500;white-space:nowrap}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

@media(max-width:700px){
  #lov{padding:0;align-items:flex-end}
  #lbox{border-radius:20px 20px 0 0;max-width:100%;padding-bottom:max(0px,env(safe-area-inset-bottom,0px))}
}

/* ═══════════════════════════════════════
   NVTG DARK THEME — Beautiful & Clean
   ═══════════════════════════════════════ */
html.dark {
  --bg: #111318;
  --bg2: #1a1d26;
  --bg3: #21253a;
  --card: #1e2235;
  --border: #2a2e45;
  --text: #e2e6f3;
  --text2: #8b92b0;
  --blue: #4a7fff;
  --blue2: #6b9bff;
  --sent-bg: #1c2f50;
  --recv-bg: #1e2235;
  --navy: #e2e6f3;
  --ok: #3dd68c;
  color-scheme: dark;
}

/* Base */
html.dark body { background: var(--bg) !important; color: var(--text) !important; }
html.dark body::before { background-image: radial-gradient(rgba(74,127,255,.06) 1.2px, transparent 1.2px) !important; }

/* ── CHAT LIST PANEL ── */
html.dark #pl { background: var(--bg2) !important; border-color: var(--border) !important; }
html.dark .lh { background: var(--bg2) !important; border-color: var(--border) !important; }
html.dark .lt { color: var(--text) !important; }
html.dark .lt span { color: var(--blue) !important; }
html.dark .ib { color: var(--text2) !important; }
html.dark .ib:hover { color: var(--text) !important; }
html.dark .bur span { background: var(--text2) !important; }

/* Chat items */
html.dark .ci { background: transparent !important; }
html.dark .ci:hover { background: rgba(255,255,255,.04) !important; }
html.dark .ci.act { background: rgba(74,127,255,.18) !important; }
html.dark .cn { color: var(--text) !important; }
html.dark .cm { color: var(--text2) !important; }
html.dark .ctime { color: var(--text2) !important; }
html.dark .llbl { color: var(--text2) !important; }

/* Search */
html.dark .ls { border-color: var(--border) !important; }
html.dark .ls input, html.dark #lsinp { background: var(--bg3) !important; border-color: var(--border) !important; color: var(--text) !important; }
html.dark .ls input::placeholder { color: var(--text2) !important; }

/* ── CHAT AREA ── */
html.dark #pc { background: var(--bg) !important; background-image: radial-gradient(rgba(74,127,255,.04) 1px, transparent 1px) !important; background-size: 22px 22px !important; }
html.dark #ch { background: var(--bg2) !important; border-color: var(--border) !important; }
html.dark .chn { color: var(--text) !important; }
html.dark .chs { color: var(--text2) !important; }
html.dark .chs.on { color: var(--ok) !important; }

/* Messages */
html.dark .mr.out .mb { background: var(--sent-bg) !important; color: #c8deff !important; }
html.dark .mr.in .mb { background: var(--recv-bg) !important; color: var(--text) !important; }
html.dark .mmeta .mt { color: var(--text2) !important; }
html.dark .dchip { background: rgba(30,34,53,.95) !important; color: var(--text2) !important; }
html.dark .mtext { color: inherit !important; }
html.dark .redbadge { color: var(--text2) !important; }

/* Reply preview */
html.dark .rp { background: rgba(74,127,255,.1) !important; border-color: var(--blue) !important; }
html.dark .rn { color: var(--blue) !important; }
html.dark .rt { color: var(--text2) !important; }

/* Input area */
html.dark #ia { background: var(--bg2) !important; border-color: var(--border) !important; }
html.dark .iw { background: var(--bg3) !important; border-color: var(--border) !important; }
html.dark .iw:focus-within { background: var(--bg3) !important; border-color: var(--blue) !important; }
html.dark .iw textarea { color: var(--text) !important; }
html.dark .iw textarea::placeholder { color: var(--text2) !important; }
html.dark .abt { color: var(--text2) !important; }
html.dark .abt:hover { color: var(--text) !important; }
html.dark .snd { background: var(--blue) !important; }
html.dark .snd:hover { background: var(--blue2) !important; }
html.dark .snd:disabled { background: var(--bg3) !important; }

/* Strip (reply/edit bar) */
html.dark #strip { border-color: var(--border) !important; }
html.dark .sttx { color: var(--text2) !important; }

/* Photo preview */
html.dark .ppitem { border-color: var(--blue) !important; }
html.dark .addp { border-color: var(--border) !important; color: var(--text2) !important; }

/* ── CONTEXT MENU ── */
html.dark #ctx, html.dark #hm, html.dark #clmenu {
  background: var(--card) !important;
  border-color: var(--border) !important;
  box-shadow: 0 8px 40px rgba(0,0,0,.5) !important;
}
html.dark .cxi { border-color: var(--border) !important; }
html.dark .cxi:hover { background: rgba(255,255,255,.05) !important; }
html.dark .cxi span { color: var(--text) !important; }
html.dark .cxi svg { color: var(--text2) !important; }
html.dark .cxi.red span { color: #ff4d6a !important; }
html.dark .cxi.red svg { color: #ff4d6a !important; }
html.dark .cxs { background: var(--border) !important; }
html.dark .hmi:hover { background: rgba(255,255,255,.05) !important; }
html.dark .hmi span { color: var(--text) !important; }
html.dark .hmi.red span { color: #ff4d6a !important; }
html.dark .ctx-react { background: var(--bg3) !important; border-color: var(--border) !important; }

/* Reactions */
html.dark .rbub { background: rgba(255,255,255,.07) !important; border-color: rgba(255,255,255,.1) !important; }
html.dark .rbub.mine { background: rgba(74,127,255,.2) !important; border-color: var(--blue) !important; }
html.dark .rbub .rcnt { color: var(--text) !important; }

/* Emoji picker */
html.dark #emj { background: var(--card) !important; border-color: var(--border) !important; }
html.dark .ej:hover { background: var(--bg3) !important; }

/* ── DIALOGS ── */
html.dark .do { background: rgba(0,0,0,.75) !important; }
html.dark .dlg { background: var(--card) !important; border: 1px solid var(--border) !important; }
html.dark .dlg h4 { color: var(--text) !important; }
html.dark .dck span { color: var(--text2) !important; }
html.dark .db.c { background: var(--bg3) !important; color: var(--text2) !important; }
html.dark .db.c:hover { background: var(--border) !important; }
html.dark .db.p { background: var(--blue) !important; }
html.dark .db.d { background: #ff4d6a !important; }

/* ── NOTIFICATIONS / MODALS ── */
html.dark #notifov, html.dark #creatorov, html.dark #frov, html.dark #upov {
  background: rgba(0,0,0,.75) !important;
}
html.dark #notifbox, html.dark #creatorbox, html.dark #frbox, html.dark #upbox {
  background: var(--card) !important;
}
html.dark .nb-hdr, html.dark .frbox-hdr, html.dark .cr-hdr { border-color: var(--border) !important; }
html.dark .nb-ttl, html.dark .frbox-ttl, html.dark .cr-name { color: var(--text) !important; }
html.dark .nb-cl, html.dark .frbox-cl { color: var(--text2) !important; }
html.dark .nb-empty, html.dark .friends-empty { color: var(--text2) !important; }
html.dark .notif-item:hover { background: rgba(255,255,255,.04) !important; }
html.dark .notif-item.unread { background: rgba(74,127,255,.08) !important; }
html.dark .ni-txt { color: var(--text) !important; }
html.dark .ni-txt span { color: var(--blue) !important; }
html.dark .ni-time { color: var(--text2) !important; }
html.dark .ni-dec { background: var(--bg3) !important; border-color: var(--border) !important; color: var(--text2) !important; }
html.dark .cr-body { background: var(--card) !important; color: var(--text2) !important; }
html.dark .cr-body a { color: var(--blue) !important; }

/* User profile modal */
html.dark #up-name { color: var(--text) !important; }
html.dark #up-user { color: var(--blue) !important; }
html.dark #up-status { color: var(--text2) !important; }
html.dark #up-bio { color: var(--text2) !important; }
html.dark #upbox > div:last-child { border-color: var(--border) !important; }
html.dark #up-msg-btn span, html.dark #up-friend-btn span { color: var(--text) !important; }
html.dark #up-msg-btn:hover, html.dark #up-friend-btn:hover { background: rgba(255,255,255,.05) !important; }
html.dark #up-friends-row { color: var(--text2) !important; }
html.dark #up-private-notice { background: var(--bg3) !important; color: var(--text2) !important; }

/* Pinned bar */
html.dark #pinbar { background: var(--bg2) !important; border-color: var(--border) !important; }
html.dark .pinm { color: var(--text2) !important; }

/* Chat search */
html.dark #csbar { background: var(--bg2) !important; border-color: var(--border) !important; }
html.dark #csinp { background: var(--bg3) !important; border-color: var(--border) !important; color: var(--text) !important; }
html.dark #cscount { color: var(--text2) !important; }

/* Typing indicator */
html.dark .typing-dots span { background: var(--text2) !important; }
html.dark .typing-text { color: var(--text2) !important; }

/* No chat selected */
html.dark #nc p { color: var(--text2) !important; }
html.dark #nc svg { color: var(--text2) !important; }
html.dark .es p { color: var(--text2) !important; }

/* ── DRAWER / SIDEBAR ── */
html.dark #drw, html.dark #sb { background: #13162a !important; }

/* ── PROFILE PAGE ── */
html.dark #pr, html.dark .pscr { background: var(--bg) !important; }
html.dark .top { background: var(--bg2) !important; border-color: var(--border) !important; }
html.dark .tttl { color: var(--text) !important; }
html.dark .hero { background: var(--bg2) !important; border-color: var(--border) !important; }
html.dark .hn { color: var(--text) !important; }
html.dark .hu { color: var(--blue) !important; }
html.dark .hs { color: var(--ok) !important; }
html.dark .card { background: var(--bg2) !important; border-color: var(--border) !important; }
html.dark .slbl { color: var(--text2) !important; }
html.dark .row { background: transparent !important; }
html.dark .row:hover { background: rgba(255,255,255,.04) !important; }
html.dark .row::before { background: var(--border) !important; }
html.dark .rl { color: var(--text) !important; }
html.dark .rv { color: var(--blue) !important; }
html.dark .rv.b { color: var(--blue) !important; }
html.dark .ra { color: var(--blue) !important; }
html.dark .ric { background: var(--bg3) !important; }
html.dark .ric svg { color: var(--text2) !important; }
html.dark .bio-row:hover { background: rgba(255,255,255,.04) !important; }
html.dark .bio-txt { color: var(--text) !important; }
html.dark .bio-ph { color: var(--text2) !important; }
html.dark .hint { color: var(--text2) !important; }
html.dark .friends-header { background: transparent !important; }
html.dark .friends-title { color: var(--text2) !important; }
html.dark .friends-count { color: var(--blue) !important; }
html.dark .friends-sep { background: var(--border) !important; }
html.dark .friend-item:hover { background: rgba(255,255,255,.04) !important; }

<script>
const Q = id => document.getElementById(id);
const GRADS = [['#1e50ff','#6b8fff'],['#f093fb','#f5576c'],['#4facfe','#00f2fe'],['#43e97b','#38f9d7'],['#fa709a','#fee140'],['#a18cd1','#fbc2eb']];

const SURL='https://eolvegtnfebxhbhxuzwx.supabase.co';
const SKEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVvbHZlZ3RuZmVieGhiaHh1end4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMDk4NTQsImV4cCI6MjA4OTU4NTg1NH0.5NKUEc2h9s4_vsLpK_wlxiCBqC2OJucgBix8dmFbC3E';
const sb=supabase.createClient(SURL,SKEY);

// ── SIDEBAR ──
function toggleSB(open){
  Q('sb').classList.toggle('open', open);
  Q('dov').classList.toggle('on', open);
}
document.addEventListener('keydown', e => { if(e.key==='Escape'){ Q('sb').classList.remove('open'); Q('dov').classList.remove('on'); }});
let _tx=0;
Q('sb').addEventListener('touchstart', e=>{ _tx=e.touches[0].clientX; },{passive:true});
Q('sb').addEventListener('touchend', e=>{ if(_tx-e.changedTouches[0].clientX>60) toggleSB(false); },{passive:true});

// ── NAV ──
function go(url){ location.href=url; }
async function doLogout(){await sb2.auth.signOut();location.href='nvtg-index.html';}

// ── RENDER USER ──
function renderUser(name, user, av){
  Q('unm').textContent = name||'Пользователь';
  Q('uus').textContent = user?('@'+user.replace(/^@/,'')):'';
  const g = GRADS[(user||'').split('').reduce((a,c)=>a+c.charCodeAt(0),0) % GRADS.length];
  const uav = Q('uav');
  uav.style.background = `linear-gradient(135deg,${g[0]},${g[1]})`;
  if(av){
    uav.innerHTML = `<img src="${av}" style="width:100%;height:100%;object-fit:cover;display:block;border-radius:50%">`;
  } else {
    const ini = (name||'П').split(' ').map(w=>w[0]||'').join('').slice(0,2).toUpperCase();
    uav.innerHTML='';uav.textContent = ini;
  }
}

// ── LOAD FROM SUPABASE ──
async function loadFromSupabase(){
  try{
    const {data:{user}}=await sb.auth.getUser();
    if(!user) return;
    const {data:p}=await sb.from('profiles').select('full_name,username,avatar_url').eq('id',user.id).single();
    if(p) renderUser(p.full_name||'Пользователь', p.username||'', p.avatar_url||'');
  }catch(e){console.warn('Settings load error',e);}
}

// ── LANGUAGE ──

function setLang(l){
  localStorage.setItem('nvtg_lang', l);
  showToast(l==='ru' ? 'Язык: Русский' : 'Language: English');
}

// ── SCALE ──
const SCALE_MIN = 75, SCALE_MAX = 200;
let curScale = parseInt(localStorage.getItem('nvtg_scale') || '100');
let scaleEnabled = localStorage.getItem('nvtg_scale_on') === '1';

function renderScale(){
  Q('scaletog').checked = scaleEnabled;
  Q('scalearea').style.display = scaleEnabled ? 'block' : 'none';
  const pct = (curScale - SCALE_MIN) / (SCALE_MAX - SCALE_MIN) * 100;
  Q('sthumb').style.left = pct + '%';
  Q('sfill').style.width = pct + '%';
  Q('scaledisp').textContent = curScale + '%';
}

function toggleScale(on){
  scaleEnabled = on;
  localStorage.setItem('nvtg_scale_on', on ? '1' : '0');
  renderScale();
}

// Slider drag
(function(){
  const thumb = Q('sthumb');
  const track = Q('strack');
  let dragging = false;

  function getVal(clientX){
    const rect = track.getBoundingClientRect();
    let p = (clientX - rect.left) / rect.width;
    p = Math.max(0, Math.min(1, p));
    const raw = SCALE_MIN + p * (SCALE_MAX - SCALE_MIN);
    // snap to 5%
    return Math.round(raw / 5) * 5;
  }

  function onMove(clientX){
    curScale = getVal(clientX);
    localStorage.setItem('nvtg_scale', curScale);
    renderScale();
  }

  thumb.addEventListener('mousedown', e=>{ dragging=true; e.preventDefault(); });
  window.addEventListener('mouseup', ()=>dragging=false);
  window.addEventListener('mousemove', e=>{ if(dragging) onMove(e.clientX); });

  thumb.addEventListener('touchstart', e=>{ dragging=true; },{passive:true});
  window.addEventListener('touchend', ()=>dragging=false);
  window.addEventListener('touchmove', e=>{
    if(dragging && e.touches.length===1) onMove(e.touches[0].clientX);
  },{passive:true});

  // click on track
  track.addEventListener('click', e=>{ if(e.target===thumb) return; onMove(e.clientX); });
})();

// ── TOAST ──
let toastTimer;
function closeLang(){}
function toggleDarkRow(){
  const tog=document.getElementById('themetog');
  const isDark=tog?tog.checked:document.documentElement.classList.contains('dark');
  const newTheme=isDark?'dark':'light';
  applyTheme(newTheme);
  if(tog) tog.checked=newTheme==='dark';
}
function initThemeToggle(){
  const t=localStorage.getItem('nvtg_theme')||'light';
  const tog=document.getElementById('themetog');
  if(tog) tog.checked=t==='dark';
}
function showToast(msg){
  clearTimeout(toastTimer);
  Q('toast').textContent = msg;
  Q('toast').classList.add('on');
  toastTimer = setTimeout(()=>Q('toast').classList.remove('on'), 1800);
}

// ── SAVE SCALE ──
function saveScale(){
  localStorage.setItem('nvtg_scale', String(curScale));
  localStorage.setItem('nvtg_scale_on', scaleEnabled ? '1' : '0');
  applyScaleNow();
  showToast('Масштаб ' + curScale + '% сохранён ✓');
}
function applyScaleNow(){
  if(scaleEnabled){
    document.documentElement.style.fontSize = (curScale/100*16) + 'px';
    document.body.style.zoom = curScale/100;
  } else {
    document.documentElement.style.fontSize = '';
    document.body.style.zoom = 1;
  }
}

// ── INIT ──
window.addEventListener('DOMContentLoaded', ()=>{
  renderUser('Пользователь','','');
  renderScale();
  initThemeToggle();
  loadFromSupabase();
});
</script>

      if(p.avatar_url){const im=document.createElement('img');im.src=p.avatar_url;im.style.cssText='width:100%;height:100%;object-fit:cover;border-radius:50%';im.onerror=()=>{av.innerHTML='';av.textContent=(p.full_name||p.username||'?')[0].toUpperCase();};av.appendChild(im);}

      body.innerHTML='<div style="font-size:.9rem;font-weight:700;color:var(--n,#0b1535)"><span style="color:#4d8bff">'+(p.full_name||uname)+'</span> хочет добавить тебя в друзья</div><div style="font-size:.75rem;color:#7a87ac;margin-top:2px">@'+uname+'</div>';
      const btns=document.createElement('div');btns.style.cssText='display:flex;gap:6px;flex-shrink:0;margin-left:6px';
      const acc=document.createElement('button');acc.textContent='Принять';acc.style.cssText='background:#1e50ff;color:#fff;border:none;border-radius:8px;padding:7px 14px;font:600 .8rem Manrope,sans-serif;cursor:pointer;white-space:nowrap';
      acc.onclick=async()=>{await sb.from('friendships').update({status:'accepted'}).eq('id',req.id);acc.textContent='✓';acc.disabled=true;dec.disabled=true;item.style.opacity='.5';};
      const dec=document.createElement('button');dec.textContent='Откл.';dec.style.cssText='background:transparent;color:#7a87ac;border:1.5px solid #dde3f5;border-radius:8px;padding:7px 12px;font:600 .8rem Manrope,sans-serif;cursor:pointer;white-space:nowrap';
      dec.onclick=async()=>{await sb.from('friendships').delete().eq('id',req.id);item.remove();};
      btns.append(acc,dec);item.append(av,body,btns);list.appendChild(item);
    });
    const b=document.getElementById('notif-badge2');if(b){b.textContent=reqs.length;b.style.display='inline-flex';}
  }catch(e){list.innerHTML='<div style="padding:20px;text-align:center;color:#ff4d6a">Ошибка: '+e.message+'</div>';}
}
function closeNotifs2(){document.getElementById('notifov2').style.display='none';}
async function checkNotifBadge2(){
  try{
    const {data:{user}}=await sb.auth.getUser();if(!user)return;
    const {data:reqs}=await sb.from('friendships').select('id').eq('addressee_id',user.id).eq('status','pending');
    const cnt=reqs?.length||0;
    const b=document.getElementById('notif-badge2');
    if(b){b.textContent=cnt;b.style.display=cnt?'inline-flex':'none';}
  }catch(e){}
}
window.addEventListener('DOMContentLoaded',()=>setTimeout(checkNotifBadge2,1000));
</script>
