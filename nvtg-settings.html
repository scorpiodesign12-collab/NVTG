<script>
(function(){
  try{
    const scaleOn=localStorage.getItem('nvtg_scale_on')==='1';
    const scale=parseInt(localStorage.getItem('nvtg_scale')||'100');
    if(scaleOn && scale!==100){
      document.addEventListener('DOMContentLoaded',()=>{
        document.body.style.zoom=scale/100;
        document.documentElement.style.fontSize=(scale/100*16)+'px';
      });
    }
  }catch(e){}
})();
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,interactive-widget=resizes-content">
<title>NVTG — Настройки</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}
input,textarea{-webkit-user-select:text!important;user-select:text!important}
html,body{height:100%;font-family:'Manrope',sans-serif;background:#f0f3ff;color:#0b1535;overflow:hidden}
:root{--n:#0b1535;--n2:#152044;--b:#1e50ff;--b2:#3d6bff;--bg:#f0f3ff;--w:#fff;--m:#7a87ac;--br:#dde3f5;--ok:#00c26f;--er:#ff3448}

#app{display:flex;height:100dvh;overflow:hidden}

/* DRAWER OVERLAY */
#dov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;opacity:0;transition:opacity .25s;pointer-events:none}
#dov.on{display:block;opacity:1;pointer-events:auto}

/* SIDEBAR */
#sb{
  position:fixed;top:0;left:0;bottom:0;width:270px;z-index:201;
  background:var(--n);transform:translateX(-100%);
  transition:transform .28s cubic-bezier(.4,0,.2,1);
  display:flex;flex-direction:column;box-shadow:6px 0 30px rgba(0,0,0,.2);
}
#sb.open{transform:translateX(0)}
@media(min-width:701px){
  #sb{position:fixed;box-shadow:6px 0 30px rgba(0,0,0,.2)}
  .bur{display:flex!important}
}
.sbh{height:56px;padding:0 16px;background:rgba(255,255,255,.05);display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,.07);flex-shrink:0}
.sbmark{width:40px;height:40px;background:transparent;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sbmark svg{width:18px;height:18px}
.sbnm{font-family:'Syne',sans-serif;font-size:1.2rem;font-weight:800;color:#fff;letter-spacing:-.03em}
.sbnm span{color:#6b8fff}
.sbnav{flex:1;overflow-y:auto;padding:8px 0}
.sbnav::-webkit-scrollbar{width:0}
.si{display:flex;align-items:center;gap:12px;padding:11px 16px;cursor:pointer;transition:background .15s}
.si:hover{background:rgba(255,255,255,.07)}
.si.act{background:rgba(30,80,255,.25)}
.sic{width:36px;height:36px;border-radius:10px;background:rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sic svg{width:18px;height:18px;color:rgba(255,255,255,.6)}
.si.act .sic{background:var(--b)}
.si.act .sic svg{color:#fff}
.si span{font-size:.92rem;font-weight:600;color:rgba(255,255,255,.7)}
.si.act span,.si.act .sic svg{color:#fff}
.si.red .sic svg,.si.red span{color:#ff5c5c!important}
.sbsep{height:1px;background:rgba(255,255,255,.07);margin:4px 0}

/* MAIN PANEL */
#main{flex:1;display:flex;flex-direction:column;height:100dvh;min-width:0;background:var(--bg);background-image:radial-gradient(var(--br) 1px,transparent 1px);background-size:22px 22px}

/* TOPBAR */
.top{height:56px;background:var(--w);border-bottom:1px solid var(--br);display:flex;align-items:center;padding:0 10px;gap:6px;flex-shrink:0;box-shadow:0 1px 4px rgba(11,21,53,.05)}
.bur{background:none;border:none;cursor:pointer;padding:8px;display:flex;flex-direction:column;gap:5px;outline:none;flex-shrink:0}
.bur span{display:block;width:20px;height:2px;background:var(--m);border-radius:2px;transition:.2s}
.bur:hover span{background:var(--n)}
.tttl{font-family:'Syne',sans-serif;font-size:1rem;font-weight:800;color:var(--n);flex:1;letter-spacing:-.02em}

/* SCROLL AREA */
.pscr{flex:1;overflow-y:auto;padding-bottom:30px}
.pscr::-webkit-scrollbar{width:3px}
.pscr::-webkit-scrollbar-thumb{background:var(--br);border-radius:3px}

/* USER HERO CARD */
.uhero{background:var(--w);display:flex;align-items:center;gap:14px;padding:18px 16px;border-bottom:1px solid var(--br);margin-bottom:8px;cursor:pointer;transition:background .15s}
.uhero:hover{background:rgba(11,21,53,.02)}
.uav{width:58px;height:58px;border-radius:50%;overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:1.3rem;font-weight:800;color:#fff}
.uav img{width:100%;height:100%;object-fit:cover;display:block}
.uinfo{flex:1;min-width:0}
.unm{font-family:'Syne',sans-serif;font-size:1.05rem;font-weight:800;color:var(--n);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.uus{font-size:.78rem;color:var(--b);font-weight:600;margin-top:2px}
.ust{font-size:.72rem;color:var(--m);margin-top:2px}
.uarr{color:var(--m);flex-shrink:0}

/* SECTION */
.card{background:var(--w);border-top:1px solid var(--br);border-bottom:1px solid var(--br);margin-bottom:8px}
.slbl{font-size:.64rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--m);padding:12px 16px 6px}

/* ROWS */
.row{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;transition:background .12s;position:relative}
.row:hover{background:rgba(11,21,53,.03)}
.row+.row::before{content:'';position:absolute;top:0;left:16px;right:0;height:1px;background:var(--br)}
.ric{width:34px;height:34px;border-radius:9px;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ric svg{width:17px;height:17px;color:var(--m)}
.rl{flex:1;min-width:0}
.rlt{font-size:.9rem;font-weight:600;color:var(--n)}
.rls{font-size:.78rem;color:var(--m);margin-top:2px}
.rv{font-size:.82rem;color:var(--b);font-weight:600;white-space:nowrap;flex-shrink:0;margin-left:auto}
.rarr{color:var(--br);flex-shrink:0;margin-left:6px}

/* TOGGLE SWITCH */
.tog{position:relative;width:46px;height:26px;flex-shrink:0;margin-left:auto}
.tog input{opacity:0;width:0;height:0;position:absolute}
.tslider{position:absolute;inset:0;background:var(--br);border-radius:13px;transition:.25s;cursor:pointer}
.tslider::before{content:'';position:absolute;left:3px;top:3px;width:20px;height:20px;background:#fff;border-radius:50%;transition:.25s;box-shadow:0 1px 4px rgba(0,0,0,.2)}
.tog input:checked+.tslider{background:var(--b)}
.tog input:checked+.tslider::before{transform:translateX(20px)}

/* SCALE SLIDER */
.scale-row{padding:12px 16px 16px;border-top:1px solid var(--br)}
.scale-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.scale-lbl{font-size:.86rem;font-weight:600;color:var(--n)}
.scale-val{font-size:.82rem;font-weight:700;color:var(--b);min-width:38px;text-align:right}
.scale-track{position:relative;height:4px;background:var(--br);border-radius:4px;cursor:pointer}
.scale-fill{position:absolute;left:0;top:0;height:100%;background:var(--b);border-radius:4px;pointer-events:none;transition:width .05s}
.scale-thumb{position:absolute;top:50%;transform:translate(-50%,-50%);width:22px;height:22px;background:var(--n);border-radius:50%;border:3px solid #fff;box-shadow:0 2px 8px rgba(11,21,53,.25);cursor:grab;transition:transform .1s;touch-action:none}
.scale-thumb:active{cursor:grabbing;transform:translate(-50%,-50%) scale(1.15)}
.scale-marks{display:flex;justify-content:space-between;margin-top:6px;padding:0 1px}
.scale-marks span{font-size:.62rem;color:var(--m);font-weight:600}

/* LANGUAGE MODAL */
#lov{display:none;position:fixed;inset:0;background:rgba(11,21,53,.5);z-index:300;backdrop-filter:blur(4px);align-items:center;justify-content:center;padding:20px}
#lov.on{display:flex}
#lbox{background:var(--w);border-radius:20px;width:100%;max-width:360px;padding:0;overflow:hidden;box-shadow:0 16px 60px rgba(11,21,53,.2);animation:zin .18s ease}
@keyframes zin{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:none}}
.lmtl{font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;color:var(--n);padding:20px 20px 14px}
.lopt{display:flex;align-items:center;gap:14px;padding:14px 20px;cursor:pointer;transition:background .12s;position:relative}
.lopt:hover{background:var(--bg)}
.lopt+.lopt::before{content:'';position:absolute;top:0;left:20px;right:0;height:1px;background:var(--br)}
.lopt-flag{font-size:1.5rem;line-height:1;flex-shrink:0}
.lopt-nm{font-size:.92rem;font-weight:600;color:var(--n)}
.lopt-sub{font-size:.75rem;color:var(--m);margin-top:2px}
.lopt-chk{margin-left:auto;width:20px;height:20px;border-radius:50%;background:var(--b);display:flex;align-items:center;justify-content:center;opacity:0;transition:.15s;flex-shrink:0}
.lopt-chk svg{width:11px;height:11px;color:#fff}
.lopt.sel .lopt-chk{opacity:1}
.lopt.sel .lopt-nm{color:var(--b)}
.lcanc{display:block;width:100%;padding:14px;text-align:center;font:600 .9rem 'Manrope',sans-serif;color:var(--m);background:var(--bg);border:none;cursor:pointer;border-top:1px solid var(--br);transition:background .12s}
.lcanc:hover{background:var(--br)}

/* TOAST */
#toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(11,21,53,.85);color:#fff;font-size:.82rem;font-weight:600;padding:8px 18px;border-radius:20px;opacity:0;transition:all .25s;pointer-events:none;z-index:500;white-space:nowrap}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

@media(max-width:700px){
  #lov{padding:0;align-items:flex-end}
  #lbox{border-radius:20px 20px 0 0;max-width:100%;padding-bottom:max(0px,env(safe-area-inset-bottom,0px))}
}
</style>

<script>
const Q = id => document.getElementById(id);
const GRADS = [['#1e50ff','#6b8fff'],['#f093fb','#f5576c'],['#4facfe','#00f2fe'],['#43e97b','#38f9d7'],['#fa709a','#fee140'],['#a18cd1','#fbc2eb']];

const SURL='https://eolvegtnfebxhbhxuzwx.supabase.co';
const SKEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVvbHZlZ3RuZmVieGhiaHh1end4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMDk4NTQsImV4cCI6MjA4OTU4NTg1NH0.5NKUEc2h9s4_vsLpK_wlxiCBqC2OJucgBix8dmFbC3E';
const sb=supabase.createClient(SURL,SKEY);

// ── SIDEBAR ──
function toggleSB(open){
  Q('sb').classList.toggle('open', open);
  Q('dov').classList.toggle('on', open);
}
document.addEventListener('keydown', e => { if(e.key==='Escape'){ Q('sb').classList.remove('open'); Q('dov').classList.remove('on'); closeLang(); }});
let _tx=0;
Q('sb').addEventListener('touchstart', e=>{ _tx=e.touches[0].clientX; },{passive:true});
Q('sb').addEventListener('touchend', e=>{ if(_tx-e.changedTouches[0].clientX>60) toggleSB(false); },{passive:true});

// ── NAV ──
function go(url){ location.href=url; }

// ── RENDER USER ──
function renderUser(name, user, av){
  Q('unm').textContent = name||'Пользователь';
  Q('uus').textContent = user?('@'+user.replace(/^@/,'')):'';
  const g = GRADS[(user||'').split('').reduce((a,c)=>a+c.charCodeAt(0),0) % GRADS.length];
  const uav = Q('uav');
  uav.style.background = `linear-gradient(135deg,${g[0]},${g[1]})`;
  if(av){
    uav.innerHTML = `<img src="${av}" style="width:100%;height:100%;object-fit:cover;display:block;border-radius:50%">`;
  } else {
    const ini = (name||'П').split(' ').map(w=>w[0]||'').join('').slice(0,2).toUpperCase();
    uav.innerHTML='';uav.textContent = ini;
  }
}

// ── LOAD FROM SUPABASE ──
async function loadFromSupabase(){
  try{
    const {data:{user}}=await sb.auth.getUser();
    if(!user) return;
    const {data:p}=await sb.from('profiles').select('full_name,username,avatar_url').eq('id',user.id).single();
    if(p) renderUser(p.full_name||'Пользователь', p.username||'', p.avatar_url||'');
  }catch(e){console.warn('Settings load error',e);}
}

;

function setLang(l){
  curLang = l;
  localStorage.setItem('nvtg_lang', l);
  applyI18n(l);
  setTimeout(closeLang, 220);
  showToast(l==='ru' ? 'Язык: Русский' : 'Language: English');
}

// ── SCALE ──
const SCALE_MIN = 75, SCALE_MAX = 200;
let curScale = parseInt(localStorage.getItem('nvtg_scale') || '100');
let scaleEnabled = localStorage.getItem('nvtg_scale_on') === '1';

function renderScale(){
  Q('scaletog').checked = scaleEnabled;
  Q('scalearea').style.display = scaleEnabled ? 'block' : 'none';
  const pct = (curScale - SCALE_MIN) / (SCALE_MAX - SCALE_MIN) * 100;
  Q('sthumb').style.left = pct + '%';
  Q('sfill').style.width = pct + '%';
  Q('scaledisp').textContent = curScale + '%';
  if(scaleEnabled){
    document.body.style.zoom = (curScale / 100);
    document.documentElement.style.fontSize = (curScale / 100 * 16) + 'px';
  } else {
    document.body.style.zoom = '';
    document.documentElement.style.fontSize = '';
  }
}

function toggleScale(on){
  scaleEnabled = on;
  localStorage.setItem('nvtg_scale_on', on ? '1' : '0');
  renderScale();
}

// Slider drag
(function(){
  const thumb = Q('sthumb');
  const track = Q('strack');
  let dragging = false;

  function getVal(clientX){
    const rect = track.getBoundingClientRect();
    let p = (clientX - rect.left) / rect.width;
    p = Math.max(0, Math.min(1, p));
    const raw = SCALE_MIN + p * (SCALE_MAX - SCALE_MIN);
    // snap to 5%
    return Math.round(raw / 5) * 5;
  }

  function onMove(clientX){
    curScale = getVal(clientX);
    localStorage.setItem('nvtg_scale', curScale);
    renderScale();
  }

  thumb.addEventListener('mousedown', e=>{ dragging=true; e.preventDefault(); });
  window.addEventListener('mouseup', ()=>dragging=false);
  window.addEventListener('mousemove', e=>{ if(dragging) onMove(e.clientX); });

  thumb.addEventListener('touchstart', e=>{ dragging=true; },{passive:true});
  window.addEventListener('touchend', ()=>dragging=false);
  window.addEventListener('touchmove', e=>{
    if(dragging && e.touches.length===1) onMove(e.touches[0].clientX);
  },{passive:true});

  // click on track
  track.addEventListener('click', e=>{ if(e.target===thumb) return; onMove(e.clientX); });
})();

// ── TOAST ──
let toastTimer;
function showToast(msg){
  clearTimeout(toastTimer);
  Q('toast').textContent = msg;
  Q('toast').classList.add('on');
  toastTimer = setTimeout(()=>Q('toast').classList.remove('on'), 1800);
}

// ── SAVE SCALE ──
function saveScale(){
  localStorage.setItem('nvtg_scale', curScale);
  localStorage.setItem('nvtg_scale_on', scaleEnabled ? '1' : '0');
  // Apply immediately
  if(scaleEnabled){
    document.body.style.zoom = curScale/100;
    document.documentElement.style.fontSize = (curScale/100*16)+'px';
  } else {
    document.body.style.zoom = '';
    document.documentElement.style.fontSize = '';
  }
  showToast('Масштаб сохранён: ' + curScale + '% — вступит в силу на всех страницах');
}

// ── CENTER AVATAR in hero ──
// Add center style to uhero
document.addEventListener('DOMContentLoaded', ()=>{
  const uhero=document.getElementById && document.querySelector && document.querySelector('.uhero');
  if(uhero){uhero.style.justifyContent='flex-start';}
});

// ── INIT ──
window.addEventListener('DOMContentLoaded', ()=>{
  renderUser('Пользователь','','');
  renderScale();
  loadFromSupabase();
});
</script>
