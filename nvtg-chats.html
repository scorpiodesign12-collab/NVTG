<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,interactive-widget=resizes-content">
<title>NVTG — Чаты</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}
input,textarea{-webkit-user-select:text!important;user-select:text!important}
html,body{height:100%;font-family:'Manrope',sans-serif;background:#f0f3ff;color:#0b1535;overflow:hidden}
:root{--navy:#0b1535;--blue:#1e50ff;--blue2:#3d6bff;--bg:#f0f3ff;--wh:#fff;--muted:#7a87ac;--brd:#dde3f5;--sent:#d4e7ff;--ok:#00c26f;--err:#ff3448;--sw:280px;--th:56px}
#app{display:flex;height:100dvh;overflow:hidden}
#dov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;opacity:0;transition:opacity .25s;pointer-events:none}
#dov.on{display:block;opacity:1;pointer-events:auto}
#drw{position:fixed;top:0;left:0;bottom:0;width:270px;z-index:201;background:var(--navy);transform:translateX(-100%);transition:transform .28s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;box-shadow:6px 0 30px rgba(0,0,0,.2)}
#drw.on{transform:translateX(0)}
.dh{padding:18px 16px 14px;background:rgba(255,255,255,.06);display:flex;align-items:center;gap:12px;cursor:pointer}
.dav{width:52px;height:52px;border-radius:50%;overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:1.05rem;font-weight:700;color:#fff}
.dav img{width:100%;height:100%;object-fit:cover;display:block}
.dnm{font-weight:700;color:#fff;font-size:.95rem}
.dus{font-size:.75rem;color:rgba(255,255,255,.5);margin-top:2px}
.dnav{flex:1;overflow-y:auto;padding:6px 0}
.dnav::-webkit-scrollbar{width:0}
.di{display:flex;align-items:center;gap:14px;padding:13px 20px;cursor:pointer;transition:background .15s}
.di:hover{background:rgba(255,255,255,.07)}
.di.act{background:rgba(30,80,255,.22)}
.di svg{color:rgba(255,255,255,.45);flex-shrink:0;width:21px;height:21px}
.di.act svg,.di.act span{color:#fff}
.di span{font-size:.93rem;font-weight:600;color:rgba(255,255,255,.75)}
.di.red svg,.di.red span{color:#ff5c5c!important}
.dsep{height:1px;background:rgba(255,255,255,.07);margin:4px 0}
#pl{width:var(--sw);flex-shrink:0;background:var(--wh);display:flex;flex-direction:column;height:100dvh;border-right:1px solid var(--brd)}
.lh{height:var(--th);background:var(--wh);border-bottom:1px solid var(--brd);display:flex;align-items:center;padding:0 8px;gap:4px;flex-shrink:0}
.bur{background:none;border:none;cursor:pointer;padding:8px;display:flex;flex-direction:column;gap:5px;outline:none;flex-shrink:0}
.bur span{display:block;width:20px;height:2px;background:var(--muted);border-radius:2px;transition:.2s}
.bur:hover span{background:var(--navy)}
.lt{font-family:'Syne',sans-serif;font-size:1.05rem;font-weight:800;color:var(--navy);letter-spacing:-.02em;flex:1}
.lt span{color:var(--blue)}
.ib{background:none;border:none;cursor:pointer;padding:8px;color:var(--muted);outline:none;transition:color .15s;flex-shrink:0}
.ib:hover{color:var(--navy)}
.ls{padding:8px 12px;border-bottom:1px solid var(--brd);display:none;flex-shrink:0}
.ls.on{display:block}
.ls input{width:100%;background:var(--bg);border:1.5px solid var(--brd);border-radius:20px;padding:7px 14px;font:500 .88rem/1 'Manrope',sans-serif;color:var(--navy);outline:none;transition:border-color .15s}
.ls input:focus{border-color:var(--blue)}
.ls input::placeholder{color:var(--muted)}
#lscroll{flex:1;overflow-y:auto}
#lscroll::-webkit-scrollbar{width:3px}
#lscroll::-webkit-scrollbar-thumb{background:var(--brd);border-radius:3px}
.llbl{font-size:.65rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);padding:10px 14px 4px}
.ci{display:flex;align-items:center;gap:10px;padding:9px 12px;cursor:pointer;transition:background .12s}
.ci:hover{background:rgba(11,21,53,.04)}
.ci.act{background:rgba(30,80,255,.08)}
.aw{position:relative;flex-shrink:0;width:50px;height:50px}
.ai{width:50px;height:50px;border-radius:50%;overflow:hidden;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:.93rem;font-weight:700;color:#fff}
.ai img{width:100%;height:100%;object-fit:cover;display:block}
.adot{position:absolute;bottom:2px;right:2px;width:12px;height:12px;border-radius:50%;background:var(--ok);border:2.5px solid var(--wh);display:none}
.adot.on{display:block}
.cb{flex:1;min-width:0}
.cr1{display:flex;align-items:baseline;gap:6px;margin-bottom:3px}
.cn{font-size:.92rem;font-weight:700;color:var(--navy);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.ctime{font-size:.7rem;color:var(--muted);white-space:nowrap;flex-shrink:0}
.cr2{display:flex;align-items:center;gap:5px}
.cm{font-size:.8rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;font-weight:500}
.cbg{background:var(--blue);color:#fff;font-size:.64rem;font-weight:700;min-width:19px;height:19px;border-radius:10px;display:flex;align-items:center;justify-content:center;padding:0 4px;flex-shrink:0}
#pc{flex:1;display:flex;flex-direction:column;height:100dvh;min-width:0;background:var(--bg);background-image:radial-gradient(var(--brd) 1px,transparent 1px);background-size:22px 22px}
#nc{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px}
#nc p{font-size:.88rem;color:var(--muted);font-weight:500}
#ch{height:var(--th);background:var(--wh);border-bottom:1px solid var(--brd);display:none;align-items:center;padding:0 10px;gap:8px;flex-shrink:0;box-shadow:0 1px 4px rgba(11,21,53,.05)}
.back{display:none;background:none;border:none;cursor:pointer;padding:6px;color:var(--blue);outline:none}
@media(max-width:700px){.back{display:block}}
.chav{width:36px;height:36px;border-radius:50%;overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:.78rem;font-weight:700;color:#fff}
.chav img{width:100%;height:100%;object-fit:cover;display:block}
.chin{flex:1;min-width:0}
.chn{font-size:.93rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chs{font-size:.72rem;color:var(--muted)}
.chs.on{color:var(--ok)}
#msgs{flex:1;overflow-y:auto;padding:10px 14px;display:flex;flex-direction:column;gap:3px;min-height:0}
#msgs::-webkit-scrollbar{width:4px}
#msgs::-webkit-scrollbar-thumb{background:rgba(11,21,53,.1);border-radius:4px}
.dchip{align-self:center;background:rgba(255,255,255,.85);border-radius:12px;padding:3px 12px;font-size:.7rem;color:var(--muted);margin:4px 0;flex-shrink:0;box-shadow:0 1px 3px rgba(11,21,53,.06)}
.es{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:40px 20px}
.es .ee{font-size:3.5rem;line-height:1}
.es p{font-size:.88rem;color:var(--muted);text-align:center;max-width:200px;line-height:1.5}
.mr{display:flex;margin-bottom:2px;position:relative;touch-action:pan-y}
.mr.out{justify-content:flex-end}
.mr.in{justify-content:flex-start}
.mb{max-width:70%;border-radius:18px;font-size:.88rem;line-height:1.45;color:var(--navy);box-shadow:0 1px 3px rgba(11,21,53,.08);word-break:break-word;position:relative;overflow:hidden}
.mr.out .mb{background:var(--sent);border-bottom-right-radius:4px}
.mr.in .mb{background:var(--wh);border-bottom-left-radius:4px}
.mtext{padding:7px 11px 0;display:block;white-space:pre-wrap;word-break:break-word}
.mmeta{display:flex;align-items:center;justify-content:flex-end;gap:3px;padding:2px 8px 6px;font-size:.63rem;color:var(--muted);flex-wrap:nowrap;white-space:nowrap}
.pg{overflow:hidden;border-radius:18px;max-width:280px;position:relative;box-shadow:0 1px 3px rgba(11,21,53,.08)}
.mr.out .pg{border-bottom-right-radius:4px;background:var(--sent)}
.mr.in .pg{border-bottom-left-radius:4px;background:var(--wh)}
.pg.n1{display:block}
.pg.n1 .pi{width:100%;aspect-ratio:4/3;overflow:hidden}
.pg.n2{display:grid;grid-template-columns:1fr 1fr;gap:2px}
.pg.n2 .pi{aspect-ratio:1}
.pi{overflow:hidden;position:relative;cursor:pointer}
.pi img{width:100%;height:100%;object-fit:cover;display:block}
#ia{background:var(--wh);border-top:1px solid var(--brd);flex-shrink:0;display:none;flex-direction:column;position:relative;z-index:20}
#pp{display:none;padding:8px 12px 0;gap:8px;overflow-x:auto;flex-shrink:0}
#pp.on{display:flex}
#pp::-webkit-scrollbar{height:0}
.ppitem{position:relative;flex-shrink:0;width:68px;height:68px;border-radius:9px;overflow:hidden;border:2px solid var(--blue)}
.ppitem img{width:100%;height:100%;object-fit:cover;display:block}
.ppitem button{position:absolute;top:2px;right:2px;width:17px;height:17px;border-radius:50%;background:rgba(0,0,0,.6);border:none;cursor:pointer;color:#fff;font-size:9px;display:flex;align-items:center;justify-content:center;outline:none;padding:0}
.addp{flex-shrink:0;width:68px;height:68px;border-radius:9px;border:2px dashed var(--brd);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);transition:border-color .15s}
.addp:hover{border-color:var(--blue);color:var(--blue)}
.ir{display:flex;align-items:flex-end;gap:8px;padding:10px 10px;padding-bottom:max(12px,env(safe-area-inset-bottom,12px))}
.abt{background:none;border:none;cursor:pointer;padding:8px;color:var(--muted);outline:none;transition:color .15s;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.abt:hover{color:var(--navy)}
.iw{flex:1;background:var(--bg);border:1.5px solid var(--brd);border-radius:22px;display:flex;align-items:flex-end;padding:8px 10px;min-height:44px;transition:border-color .15s}
.iw:focus-within{border-color:var(--blue);background:#fff}
.iw textarea{flex:1;background:transparent;border:none;outline:none;resize:none;font:500 .92rem/1.4 'Manrope',sans-serif;color:var(--navy);max-height:120px;min-height:22px;overflow-y:auto}
.iw textarea::-webkit-scrollbar{width:0}
.iw textarea::placeholder{color:var(--muted)}
.snd{width:44px;height:44px;border-radius:50%;background:var(--navy);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s;outline:none;flex-shrink:0}
.snd:hover{background:#152044}
.snd:disabled{background:var(--brd);cursor:default}
.snd svg{width:19px;height:19px;color:#fff}
#lb{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:600;align-items:center;justify-content:center;flex-direction:column}
#lb.on{display:flex}
#lbimg{max-width:95vw;max-height:88vh;border-radius:10px;object-fit:contain}
.lbc{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.12);border:none;border-radius:50%;width:42px;height:42px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff}
#lbc-l{left:12px}
#lbc-r{right:12px}
#lbcnt{color:rgba(255,255,255,.6);font-size:.8rem;margin-top:10px}
/* SEARCH MODAL */
#srchov{display:none;position:fixed;inset:0;background:rgba(11,21,53,.5);z-index:300;backdrop-filter:blur(4px);align-items:flex-start;justify-content:center;padding-top:60px}
#srchov.on{display:flex}
#srchbox{background:var(--wh);border-radius:20px;width:100%;max-width:420px;overflow:hidden;box-shadow:0 16px 60px rgba(11,21,53,.2);animation:srchi .18s ease}
@keyframes srchi{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:none}}
.srch-head{padding:14px 16px;border-bottom:1px solid var(--brd);display:flex;align-items:center;gap:10px}
.srch-head input{flex:1;background:var(--bg);border:1.5px solid var(--brd);border-radius:20px;padding:8px 14px;font:500 .9rem/1 'Manrope',sans-serif;color:var(--navy);outline:none;transition:border-color .15s}
.srch-head input:focus{border-color:var(--blue)}
.srch-head button{background:none;border:none;cursor:pointer;color:var(--muted);padding:6px;font:600 .85rem 'Manrope',sans-serif}
#srch-res{max-height:360px;overflow-y:auto}
.srch-item{display:flex;align-items:center;gap:12px;padding:12px 16px;cursor:pointer;transition:background .12s}
.srch-item:hover{background:rgba(11,21,53,.04)}
.srch-info{flex:1;min-width:0}
.srch-nm{font-size:.92rem;font-weight:700;color:var(--navy)}
.srch-us{font-size:.76rem;color:var(--muted);margin-top:2px}
.srch-btn{background:var(--blue);color:#fff;border:none;border-radius:10px;padding:7px 16px;font:600 .82rem 'Manrope',sans-serif;cursor:pointer;white-space:nowrap}
.srch-empty{padding:30px;text-align:center;color:var(--muted);font-size:.88rem}
@media(max-width:700px){#srchov{padding-top:20px;align-items:flex-end}#srchbox{border-radius:20px 20px 0 0;max-width:100%}}
@media(max-width:700px){#pl{display:flex}#pl.hide{display:none}#pc{display:none}#pc.open{display:flex}}
</style>
</head>
<body>
<div id="dov" onclick="D.cd()"></div>
<div id="app">
  <div id="drw">
    <div class="dh" onclick="location.href='nvtg-profile.html'">
      <div class="dav" id="dav-el"></div>
      <div><div class="dnm" id="dav-nm">Загрузка...</div><div class="dus" id="dav-us"></div></div>
    </div>
    <nav class="dnav">
      <div class="di act"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><span>Чаты</span></div>
      <div class="di" onclick="location.href='nvtg-profile.html'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span>Мой профиль</span></div>
      <div class="di" onclick="location.href='nvtg-settings.html'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M4.22 4.22l2.12 2.12M17.66 17.66l2.12 2.12M2 12h3M19 12h3M4.22 19.78l2.12-2.12M17.66 6.34l2.12-2.12"/></svg><span>Настройки</span></div>
      <div class="dsep"></div>
      <div class="di red" onclick="doLogout()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg><span>Выйти</span></div>
    </nav>
  </div>

  <div id="pl">
    <div class="lh">
      <button class="bur" onclick="D.od()"><span></span><span></span><span></span></button>
      <div class="lt">NV<span>TG</span></div>
      <button class="ib" title="Найти пользователя" onclick="openSearch()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></button>
    </div>
    <div id="lscroll"><div id="chat-list"><div class="srch-empty">Загрузка чатов...</div></div></div>

  <div id="pc">
    <div id="nc">
      <div style="font-size:2.5rem">💬</div>
      <p>Выберите чат или найдите<br>пользователя по кнопке 🔍</p>
    </div>
    <div id="ch">
      <button class="back" onclick="backToList()"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg></button>
      <div class="chav" id="chav-el"></div>
      <div class="chin"><div class="chn" id="chn-nm"></div><div class="chs" id="chn-st">в сети</div></div>
    </div>
    <div id="msgs"></div>
    <div id="ia">
      <div id="pp"></div>
      <div class="ir">
        <button class="abt" onclick="Q('photo-inp').click()"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></button>
        <div class="iw"><textarea id="msgtxt" placeholder="Сообщение..." rows="1" oninput="autoResize(this);updSnd()" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg();}"></textarea></div>
        <button class="snd" id="snd-btn" disabled onclick="sendMsg()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></button>
      </div>
    </div>
  </div>
</div>

<!-- LIGHTBOX -->
<div id="lb" onclick="closeLb()">
  <button class="lbc" id="lbc-l" onclick="event.stopPropagation();lbNav(-1)"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg></button>
  <img id="lbimg">
  <button class="lbc" id="lbc-r" onclick="event.stopPropagation();lbNav(1)"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg></button>
  <div id="lbcnt"></div>
</div>

<!-- SEARCH MODAL -->
<div id="srchov" onclick="if(event.target===this)closeSearch()">
  <div id="srchbox">
    <div class="srch-head">
      <input type="text" id="srch-inp" placeholder="Найти пользователя..." oninput="doSearch(this.value)">
      <button onclick="closeSearch()">Закрыть</button>
    </div>
    <div id="srch-res"><div class="srch-empty">Введите имя или @юзернейм</div></div>
  </div>
</div>
<input type="file" id="photo-inp" accept="image/*" multiple style="display:none" onchange="addPhotos(event)">

<script>
const SURL='https://eolvegtnfebxhbhxuzwx.supabase.co';
const SKEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVvbHZlZ3RuZmVieGhiaHh1end4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMDk4NTQsImV4cCI6MjA4OTU4NTg1NH0.5NKUEc2h9s4_vsLpK_wlxiCBqC2OJucgBix8dmFbC3E';
const sb=supabase.createClient(SURL,SKEY);
const Q=id=>document.getElementById(id);
const GRADS=[['#1e50ff','#6b8fff'],['#f093fb','#f5576c'],['#4facfe','#00f2fe'],['#43e97b','#38f9d7'],['#fa709a','#fee140'],['#a18cd1','#fbc2eb']];

let ME=null, curChatId=null, curPartner=null, msgSub=null;
let pendingPhotos=[];
let lbPhotos=[],lbIdx=0;

function grad(s=''){const n=s.split('').reduce((a,c)=>a+c.charCodeAt(0),0);return GRADS[n%GRADS.length];}
function avEl(prof,size=50){
  const g=grad(prof.username||'');
  const ini=(prof.full_name||prof.username||'?').split(' ').map(w=>w[0]||'').join('').slice(0,2).toUpperCase();
  if(prof.avatar_url)return `<img src="${prof.avatar_url}" style="width:${size}px;height:${size}px;border-radius:50%;object-fit:cover;display:block">`;
  return `<div style="width:${size}px;height:${size}px;border-radius:50%;background:linear-gradient(135deg,${g[0]},${g[1]});display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:${Math.round(size*.34)}px;font-weight:700;color:#fff">${ini}</div>`;
}
function fmtTime(ts){
  const d=new Date(ts),now=new Date(),diff=now-d;
  if(diff<60000)return 'только что';
  if(diff<3600000)return Math.floor(diff/60000)+'м';
  if(d.toDateString()===now.toDateString())return d.toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'});
  return d.toLocaleDateString('ru',{day:'numeric',month:'short'});
}
function fmtFull(ts){return new Date(ts).toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'});}

// DRAWER
const D={
  od(){Q('drw').classList.add('on');Q('dov').classList.add('on');},
  cd(){Q('drw').classList.remove('on');Q('dov').classList.remove('on');}
};
async function doLogout(){await sb.auth.signOut();location.href='nvtg-index.html';}

// MOBILE
function backToList(){Q('pl').classList.remove('hide');Q('pc').classList.remove('open');}

// ── INIT ──
window.addEventListener('DOMContentLoaded',async()=>{
  const {data:{user}}=await sb.auth.getUser();
  if(!user){location.href='nvtg-index.html';return;}
  const {data:prof}=await sb.from('profiles').select('*').eq('id',user.id).single();
  if(!prof){location.href='nvtg-index.html';return;}
  ME=prof;
  // render drawer header
  Q('dav-el').innerHTML=avEl(prof,52);
  Q('dav-nm').textContent=prof.full_name||prof.username;
  Q('dav-us').textContent=prof.username;
  loadChats();
  // realtime: listen for new messages in any of my chats
  sb.channel('global').on('postgres_changes',{event:'INSERT',schema:'public',table:'messages'},async(payload)=>{
    const msg=payload.new;
    // if this is the open chat — append
    if(msg.chat_id===curChatId){appendMsg(msg,msg.sender_id===ME.id);}
    // refresh chat list
    loadChats();
  }).subscribe();
});

// ── CHATS LIST ──
async function loadChats(){
  const {data:chats}=await sb.from('chats')
    .select('*,user1:profiles!chats_user1_id_fkey(*),user2:profiles!chats_user2_id_fkey(*)')
    .or(`user1_id.eq.${ME.id},user2_id.eq.${ME.id}`)
    .order('created_at',{ascending:false});
  if(!chats||chats.length===0){Q('chat-list').innerHTML='<div class="srch-empty">Нет чатов. Нажмите 🔍 чтобы найти людей</div>';return;}
  // fetch last message for each
  const chatIds=chats.map(c=>c.id);
  const {data:lastMsgs}=await sb.from('messages')
    .select('*')
    .in('chat_id',chatIds)
    .order('created_at',{ascending:false});
  const lastMap={};
  (lastMsgs||[]).forEach(m=>{if(!lastMap[m.chat_id])lastMap[m.chat_id]=m;});
  Q('chat-list').innerHTML=chats.map(c=>{
    const partner=c.user1_id===ME.id?c.user2:c.user1;
    const last=lastMap[c.id];
    const lastTxt=last?(last.photos?.length?'📷 Фото':last.text):'';
    const lastTime=last?fmtTime(last.created_at):'';
    return `<div class="ci${curChatId===c.id?' act':''}" onclick="openChat('${c.id}','${partner.id}')">
      <div class="aw"><div class="ai">${avEl(partner,50)}</div></div>
      <div class="cb"><div class="cr1"><div class="cn">${partner.full_name||partner.username}</div><div class="ctime">${lastTime}</div></div>
      <div class="cr2"><div class="cm">${lastTxt||'Начните общение'}</div></div></div>
    </div>`;
  }).join('');
}

// ── OPEN CHAT ──
async function openChat(chatId,partnerId){
  curChatId=chatId;
  // fetch partner
  const {data:partner}=await sb.from('profiles').select('*').eq('id',partnerId).single();
  curPartner=partner;
  // update header
  Q('ch').style.display='flex';
  Q('chav-el').innerHTML=avEl(partner,36);
  Q('chn-nm').textContent=partner.full_name||partner.username;
  Q('ia').style.display='flex';
  Q('nc').style.display='none';
  // mobile
  Q('pl').classList.add('hide');
  Q('pc').classList.add('open');
  // highlight in list
  document.querySelectorAll('.ci').forEach(el=>el.classList.remove('act'));
  document.querySelectorAll('.ci').forEach(el=>{if(el.getAttribute('onclick')?.includes(chatId))el.classList.add('act');});
  // load messages
  const {data:msgs}=await sb.from('messages')
    .select('*')
    .eq('chat_id',chatId)
    .order('created_at',{ascending:true});
  Q('msgs').innerHTML='';
  if(!msgs||msgs.length===0){
    Q('msgs').innerHTML='<div class="es"><div class="ee">👋</div><p>Начало вашего чата с '+escH(partner.full_name||partner.username)+'</p></div>';
  } else {
    let lastDate='';
    msgs.forEach(m=>{
      const d=new Date(m.created_at).toLocaleDateString('ru',{day:'numeric',month:'long'});
      if(d!==lastDate){lastDate=d;Q('msgs').insertAdjacentHTML('beforeend',`<div class="dchip">${d}</div>`);}
      appendMsg(m,m.sender_id===ME.id);
    });
  }
  scrollDown();
  Q('msgtxt').focus();
}

function appendMsg(m,isOut){
  // remove empty state
  const es=Q('msgs').querySelector('.es');if(es)es.remove();
  const photos=m.photos||[];
  const time=fmtFull(m.created_at);
  let inner='';
  if(photos.length){
    const cls=`pg n${Math.min(photos.length,2)}`;
    inner=`<div class="${cls}">${photos.map((p,i)=>`<div class="pi" onclick='openLb(${JSON.stringify(photos)},${i})'><img src="${p}" loading="lazy"></div>`).join('')}</div>`;
    if(m.text)inner+=`<div class="mtext" style="padding-top:4px">${escH(m.text)}</div>`;
    inner+=`<div class="mmeta">${time}</div>`;
    Q('msgs').insertAdjacentHTML('beforeend',`<div class="mr ${isOut?'out':'in'}">${inner}</div>`);
  } else {
    inner=`<div class="mb"><span class="mtext">${escH(m.text)}</span><div class="mmeta">${time}</div></div>`;
    Q('msgs').insertAdjacentHTML('beforeend',`<div class="mr ${isOut?'out':'in'}">${inner}</div>`);
  }
  scrollDown();
}

function scrollDown(){setTimeout(()=>{Q('msgs').scrollTop=Q('msgs').scrollHeight;},50);}
function escH(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');}

// ── SEND ──
async function sendMsg(){
  if(!curChatId)return;
  const txt=Q('msgtxt').value.trim();
  if(!txt&&pendingPhotos.length===0)return;
  Q('snd-btn').disabled=true;
  let photoUrls=[];
  // upload photos
  for(const f of pendingPhotos){
    const path=`${ME.id}/${Date.now()}_${f.name}`;
    const {error}=await sb.storage.from('photos').upload(path,f,{contentType:f.type});
    if(!error){const {data}=sb.storage.from('photos').getPublicUrl(path);photoUrls.push(data.publicUrl);}
  }
  await sb.from('messages').insert({chat_id:curChatId,sender_id:ME.id,text:txt,photos:photoUrls});
  Q('msgtxt').value='';Q('msgtxt').style.height='';
  pendingPhotos=[];Q('pp').innerHTML='';Q('pp').classList.remove('on');
  updSnd();
}

function updSnd(){
  Q('snd-btn').disabled=!Q('msgtxt').value.trim()&&pendingPhotos.length===0;
}
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px';}

// ── PHOTOS ──
function addPhotos(e){
  const files=[...e.target.files].slice(0,10-pendingPhotos.length);
  files.forEach(f=>{if(f.size>5*1024*1024)return;pendingPhotos.push(f);});
  renderPreviews();e.target.value='';
}
function renderPreviews(){
  Q('pp').innerHTML='';
  if(!pendingPhotos.length){Q('pp').classList.remove('on');return;}
  Q('pp').classList.add('on');
  pendingPhotos.forEach((f,i)=>{
    const url=URL.createObjectURL(f);
    Q('pp').insertAdjacentHTML('beforeend',`<div class="ppitem"><img src="${url}"><button onclick="removePhoto(${i})">✕</button></div>`);
  });
  Q('pp').insertAdjacentHTML('beforeend',`<div class="addp" onclick="Q('photo-inp').click()"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></div>`);
  updSnd();
}
function removePhoto(i){pendingPhotos.splice(i,1);renderPreviews();}

// ── LIGHTBOX ──
function openLb(photos,idx){lbPhotos=photos;lbIdx=idx;Q('lbimg').src=photos[idx];Q('lbcnt').textContent=photos.length>1?(idx+1)+'/'+photos.length:'';Q('lb').classList.add('on');}
function closeLb(){Q('lb').classList.remove('on');}
function lbNav(d){lbIdx=(lbIdx+d+lbPhotos.length)%lbPhotos.length;Q('lbimg').src=lbPhotos[lbIdx];Q('lbcnt').textContent=lbPhotos.length>1?(lbIdx+1)+'/'+lbPhotos.length:'';}

// ── SEARCH USERS ──
let srchTimer=null;
function openSearch(){Q('srchov').classList.add('on');setTimeout(()=>Q('srch-inp').focus(),100);}
function closeSearch(){Q('srchov').classList.remove('on');Q('srch-inp').value='';Q('srch-res').innerHTML='<div class="srch-empty">Введите имя или @юзернейм</div>';}
function doSearch(q){
  clearTimeout(srchTimer);
  if(!q.trim()){Q('srch-res').innerHTML='<div class="srch-empty">Введите имя или @юзернейм</div>';return;}
  srchTimer=setTimeout(async()=>{
    const sq=q.toLowerCase().replace(/^@/,'');
    const {data:users}=await sb.from('profiles')
      .select('*')
      .or(`username.ilike.%${sq}%,full_name.ilike.%${sq}%`)
      .neq('id',ME.id)
      .limit(20);
    if(!users||users.length===0){Q('srch-res').innerHTML='<div class="srch-empty">Никого не найдено</div>';return;}
    Q('srch-res').innerHTML=users.map(u=>`
      <div class="srch-item">
        ${avEl(u,44)}
        <div class="srch-info"><div class="srch-nm">${escH(u.full_name||u.username)}</div><div class="srch-us">${escH(u.username)}</div></div>
        <button class="srch-btn" onclick="startChat('${u.id}')">Написать</button>
      </div>`).join('');
  },300);
}

async function startChat(partnerId){
  // find or create chat
  const uid=ME.id;
  const {data:existing}=await sb.from('chats')
    .select('id')
    .or(`and(user1_id.eq.${uid},user2_id.eq.${partnerId}),and(user1_id.eq.${partnerId},user2_id.eq.${uid})`)
    .maybeSingle();
  let chatId;
  if(existing){chatId=existing.id;}
  else{
    const {data:nc}=await sb.from('chats').insert({user1_id:uid,user2_id:partnerId}).select().single();
    chatId=nc.id;
  }
  closeSearch();
  await loadChats();
  openChat(chatId,partnerId);
}

document.addEventListener('keydown',e=>{if(e.key==='Escape'){D.cd();closeSearch();}});
let _tx=0;
Q('drw').addEventListener('touchstart',e=>{_tx=e.touches[0].clientX;},{passive:true});
Q('drw').addEventListener('touchend',e=>{if(_tx-e.changedTouches[0].clientX>60)D.cd();},{passive:true});
Q('lb').addEventListener('touchstart',e=>{lbPhotos.length>1&&(Q('lb')._sx=e.touches[0].clientX);},{passive:true});
Q('lb').addEventListener('touchend',e=>{if(!lbPhotos.length)return;const dx=(Q('lb')._sx||0)-e.changedTouches[0].clientX;if(Math.abs(dx)>50)lbNav(dx>0?1:-1);else if(Math.abs(dx)<10)closeLb();},{passive:true});
if(window.visualViewport&&window.innerWidth<=700){
  const upd=()=>{const pc=Q('pc');if(!pc.classList.contains('open'))return;pc.style.height=window.visualViewport.height+'px';pc.style.top=window.visualViewport.offsetTop+'px';};
  window.visualViewport.addEventListener('resize',upd);window.visualViewport.addEventListener('scroll',upd);
}
</script>
